<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>教务管理系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Microsoft YaHei", sans-serif;
            background: #f0f2f5;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px;
            text-align: center;
        }
        .header h1 { font-size: 36px; margin-bottom: 10px; }
        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
        }
        .stat-card {
            flex: 1;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            text-align: center;
        }
        .stat-card .num {
            font-size: 40px;
            font-weight: bold;
            color: #667eea;
        }
        .stat-card .label {
            color: #888;
            margin-top: 8px;
        }
        .menu {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }
        .menu-card {
            background: white;
            padding: 40px 20px;
            border-radius: 12px;
            text-align: center;
            text-decoration: none;
            color: #333;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            transition: all 0.3s;
        }
        .menu-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
        }
        .menu-card .icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        .menu-card h3 { font-size: 20px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>📚 教务管理系统</h1>
        <p>Educational Administration System</p>
    </div>
    <div class="container">
        <div class="stats">
            <div class="stat-card">
                <div class="num">{{ stu_count }}</div>
                <div class="label">学生总数</div>
            </div>
            <div class="stat-card">
                <div class="num">{{ course_count }}</div>
                <div class="label">课程总数</div>
            </div>
            <div class="stat-card">
                <div class="num">{{ grade_count }}</div>
                <div class="label">成绩记录</div>
            </div>
        </div>
        <div class="menu">
            <a href="/students" class="menu-card">
                <div class="icon">👨‍🎓</div>
                <h3>学生信息管理</h3>
            </a>
            <a href="/courses" class="menu-card">
                <div class="icon">📖</div>
                <h3>课程信息管理</h3>
            </a>
            <a href="/grades" class="menu-card">
                <div class="icon">📝</div>
                <h3>成绩管理</h3>
            </a>
        </div>
    </div>
</body>
</html>
