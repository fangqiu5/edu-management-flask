<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>编辑学生 - 教务管理系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Microsoft YaHei", sans-serif; background: #f0f2f5; }
        .nav {
            background: #667eea;
            padding: 15px 30px;
            display: flex;
            align-items: center;
            gap: 30px;
        }
        .nav a { color: white; text-decoration: none; }
        .nav .logo { font-size: 20px; font-weight: bold; }
        .container { max-width: 600px; margin: 40px auto; padding: 0 20px; }
        .card {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        .card h2 { margin-bottom: 20px; color: #333; }
        .form-group { margin-bottom: 15px; }
        .form-group label {
            display: block;
            margin-bottom: 6px;
            color: #666;
            font-size: 14px;
        }
        .form-group input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }
        .btn-row { display: flex; gap: 10px; margin-top: 25px; }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            text-decoration: none;
            display: inline-block;
        }
        .btn-primary { background: #667eea; color: white; }
        .btn-default { background: #909399; color: white; }
    </style>
</head>
<body>
    <div class="nav">
        <a href="/" class="logo">📚 教务管理系统</a>
        <a href="/students">学生管理</a>
        <a href="/courses">课程管理</a>
        <a href="/grades">成绩管理</a>
        <a href="/logout" style="margin-left: auto;">退出登录</a>
    </div>

    <div class="container">
        <div class="card">
            <h2>✏️ 编辑学生信息</h2>
            <form method="POST">
                <div class="form-group">
                    <label>学号（不可修改）</label>
                    <input type="text" value="{{ stu.stu_id }}" disabled>
                </div>
                <div class="form-group">
                    <label>姓名</label>
                    <input type="text" name="name" value="{{ stu.name }}" required>
                </div>
                <div class="form-group">
                    <label>性别</label>
                    <input type="text" name="gender" value="{{ stu.gender or '' }}">
                </div>
                <div class="form-group">
                    <label>年龄</label>
                    <input type="text" name="age" value="{{ stu.age or '' }}">
                </div>
                <div class="form-group">
                    <label>专业</label>
                    <input type="text" name="major" value="{{ stu.major or '' }}">
                </div>
                <div class="form-group">
                    <label>班级</label>
                    <input type="text" name="class_name" value="{{ stu.class_name or '' }}">
                </div>
                <div class="form-group">
                    <label>联系电话</label>
                    <input type="text" name="phone" value="{{ stu.phone or '' }}">
                </div>
                <div class="btn-row">
                    <button type="submit" class="btn btn-primary">保存修改</button>
                    <a href="/students" class="btn btn-default">返回</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
